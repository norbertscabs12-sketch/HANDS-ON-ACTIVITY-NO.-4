<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IronCore | Fitness Store</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="main-header">

<div class="logo">Iron<span>Core</span></div>

<nav class="header-actions">
<button class="btn-login">Login</button>

<div class="cart-wrapper">
<button class="btn-cart">🛒 Cart</button>
<span class="badge">2</span>
</div>

</nav>

</header>


<section class="hero">

<div class="hero-content">
<h1>Build Strength. Break Limits.</h1>
<p>Premium gym gear for serious athletes.</p>
<button class="btn-cta">Shop Now</button>
</div>

</section>


<nav class="filter-section">

<button class="pill active">All</button>
<button class="pill">Weights</button>
<button class="pill">Gym Equipment</button>
<button class="pill">Apparel</button>

</nav>


<main class="product-grid">


<article class="card sale">

<div class="card-img">
<img src="dumbbell.jpg" alt="Dumbbells">
</div>

<div class="card-info">
<h3>Adjustable Dumbbells</h3>
<p class="meta">Heavy Duty Steel Set</p>
<div class="price">$150 <span class="old-price">$200</span></div>
<button class="btn-add">Add to Cart</button>
</div>

</article>


<article class="card">

<div class="card-img">
<img src="shoes.jpg" alt="Training Shoes">
</div>

<div class="card-info">
<h3>Training Shoes</h3>
<p class="meta">Grip & Stability</p>
<div class="price">$110</div>
<button class="btn-add">Add to Cart</button>
</div>

</article>


<article class="card low-stock">

<div class="card-img">
<img src="tanktop.jpg" alt="Gym Tank Top">
</div>

<div class="card-info">
<h3>Performance Tank Top</h3>
<p class="meta">Breathable & Lightweight</p>
<div class="price">$40</div>
<button class="btn-add">Add to Cart</button>
</div>

</article>


<article class="card">

<div class="card-img">
<img src="bench.jpg" alt="Workout Bench">
</div>

<div class="card-info">
<h3>Adjustable Workout Bench</h3>
<p class="meta">Full Body Training</p>
<div class="price">$220</div>
<button class="btn-add btn--added">Added to Cart</button>
</div>

</article>

</main>

</body>
</html>
